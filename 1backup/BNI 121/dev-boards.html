<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boards — DevOps · BNI 121</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family:'Inter',sans-serif; background:#f3f4f6; color:#0f172a; }
    .col-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-radius:10px 10px 0 0; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
    .col-body { background:#f8fafc; border:1px solid #e2e8f0; border-top:none; border-radius:0 0 10px 10px; padding:10px; min-height:300px; max-height:calc(100vh - 280px); overflow-y:auto; }
    .col-body.dragover { background:#e0e7ff; border-color:#6366f1; }
    .wi-card { background:white; border:1px solid #e2e8f0; border-left:4px solid #94a3b8; border-radius:8px; padding:10px; margin-bottom:8px; cursor:pointer; transition:all 0.12s; box-shadow:0 1px 2px rgba(0,0,0,0.03); }
    .wi-card:hover { border-color:#cbd5e1; box-shadow:0 4px 12px rgba(15,23,42,0.08); }
    .wi-card.dragging { opacity:0.4; }
    .wi-card.story { border-left-color:#10b981; }
    .wi-card.task  { border-left-color:#3b82f6; }
    .wi-card.bug   { border-left-color:#ef4444; }
    .wi-card.epic  { border-left-color:#8b5cf6; }
    .type-icon { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; padding:2px 7px; border-radius:4px; }
    .type-story { background:#ecfdf5; color:#047857; }
    .type-task  { background:#eff6ff; color:#1d4ed8; }
    .type-bug   { background:#fef2f2; color:#b91c1c; }
    .type-epic  { background:#f5f3ff; color:#6d28d9; }
    .pri-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
    .pri-Critical { background:#dc2626; }
    .pri-High     { background:#ea580c; }
    .pri-Medium   { background:#ca8a04; }
    .pri-Low      { background:#94a3b8; }
    .pts { font-size:10px; font-weight:800; padding:1px 6px; border-radius:999px; background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; }
    .av-chip { width:22px; height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; border:1.5px solid white; box-shadow:0 0 0 1px #cbd5e1; }
    .add-btn { width:100%; padding:8px; border:1.5px dashed #cbd5e1; border-radius:8px; color:#64748b; font-size:12px; font-weight:600; cursor:pointer; background:transparent; transition:all 0.12s; }
    .add-btn:hover { background:#fff; border-color:#94a3b8; color:#0f172a; }
    .modal-bg { position:fixed; inset:0; background:rgba(15,23,42,0.5); z-index:80; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-card { background:white; border-radius:14px; max-width:580px; width:100%; max-height:90vh; overflow-y:auto; padding:24px; box-shadow:0 25px 60px rgba(0,0,0,0.25); }
    .filter-pill { padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; border:1.5px solid #e2e8f0; background:white; color:#64748b; cursor:pointer; }
    .filter-pill:hover { border-color:#3b82f6; color:#3b82f6; }
    .filter-pill.active { background:#1e40af; color:white; border-color:#1e40af; }
  </style>
</head>
<body>
  <main class="px-4 sm:px-6 py-5 max-w-[1600px] mx-auto">
    <header class="mb-4 flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900" style="letter-spacing:-0.02em">Engineering Boards</h1>
        <p class="text-slate-500 text-sm mt-0.5">Kanban view of dev work — drag to change state, click to edit, "+ New" per column.</p>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <select id="projectSel" onchange="onProjectChange()" class="border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold bg-white"></select>
        <select id="assigneeSel" onchange="render()" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">All assignees</option>
        </select>
        <select id="typeSel" onchange="render()" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="">All types</option>
          <option>Story</option><option>Task</option><option>Bug</option><option>Epic</option>
        </select>
        <button onclick="openItem()" class="bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-800">+ New work item</button>
      </div>
    </header>

    <div id="loadingState" class="text-center py-12 text-slate-400">Loading board…</div>
    <div id="board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden"></div>
  </main>

  <!-- Work item modal -->
  <div id="itemModal" class="hidden modal-bg">
    <div class="modal-card">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="text-[10px] uppercase tracking-wider font-bold text-slate-400" id="m_id_label">New work item</div>
          <h3 id="m_heading" class="text-xl font-bold text-slate-900">New work item</h3>
        </div>
        <button onclick="closeItem()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
      </div>
      <form id="itemForm" onsubmit="saveItem(event)" class="grid grid-cols-2 gap-3 text-sm">
        <input type="hidden" id="m_id" />
        <label class="col-span-2"><span class="block text-xs font-bold text-slate-600 mb-1">Title *</span>
          <input id="m_title" required class="w-full border rounded-lg px-3 py-2" placeholder="What needs to be done?" /></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">Type</span>
          <select id="m_type" class="w-full border rounded-lg px-3 py-2">
            <option>Story</option><option selected>Task</option><option>Bug</option><option>Epic</option>
          </select></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">State</span>
          <select id="m_state" class="w-full border rounded-lg px-3 py-2">
            <option>To Do</option><option>In Progress</option><option>Review</option><option>Done</option>
          </select></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">Priority</span>
          <select id="m_priority" class="w-full border rounded-lg px-3 py-2">
            <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option>
          </select></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">Story points</span>
          <input id="m_points" type="number" min="0" max="100" class="w-full border rounded-lg px-3 py-2" placeholder="3" /></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">Assignee</span>
          <select id="m_assignee" class="w-full border rounded-lg px-3 py-2"><option value="">— Unassigned —</option></select></label>
        <label class="col-span-1"><span class="block text-xs font-bold text-slate-600 mb-1">Due date</span>
          <input id="m_due" type="date" class="w-full border rounded-lg px-3 py-2" /></label>
        <label class="col-span-2"><span class="block text-xs font-bold text-slate-600 mb-1">Description</span>
          <textarea id="m_description" rows="4" class="w-full border rounded-lg px-3 py-2" placeholder="Acceptance criteria, links, notes…"></textarea></label>
        <label class="col-span-2"><span class="block text-xs font-bold text-slate-600 mb-1">Tags <span class="text-slate-400 font-normal">(comma-separated)</span></span>
          <input id="m_tags" class="w-full border rounded-lg px-3 py-2" placeholder="frontend, supabase, urgent" /></label>
        <div class="col-span-2 flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-blue-700 text-white py-2.5 rounded-lg font-bold hover:bg-blue-800">Save</button>
          <button type="button" id="m_delete_btn" onclick="deleteItem()" class="hidden px-4 py-2.5 border border-red-200 rounded-lg text-sm font-bold text-red-600 hover:bg-red-50">Delete</button>
          <button type="button" onclick="closeItem()" class="px-4 py-2.5 border border-slate-200 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="bni-sidebar.js"></script>
  <script>
  const STATES = ['To Do', 'In Progress', 'Review', 'Done'];
  const STATE_COLORS = {
    'To Do':       { bg:'#f1f5f9', text:'#475569' },
    'In Progress': { bg:'#dbeafe', text:'#1e40af' },
    'Review':      { bg:'#fef3c7', text:'#92400e' },
    'Done':        { bg:'#dcfce7', text:'#15803d' },
  };
  const TYPE_CLASS = { Story:'story', Task:'task', Bug:'bug', Epic:'epic' };
  let _projects = [];
  let _items    = [];
  let _devs     = [];
  let _projectId = null;

  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
  function avatarColor(s) { const colors = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ec4899','#06b6d4','#f97316','#ef4444']; let h=0; for (const c of String(s||'')) h=(h*31+c.charCodeAt(0))|0; return colors[Math.abs(h)%colors.length]; }
  function initials(name) { return (name||'?').split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase(); }

  async function loadAll() {
    const [{data: ps}, {data: items}] = await Promise.all([
      window.sb.from('dev_projects').select('*').eq('hidden', false).order('name'),
      window.sb.from('dev_work_items').select('*').order('created_at', { ascending: false }),
    ]);
    _projects = ps || [];
    _items    = items || [];
    _devs     = (window.BNI_DEVS || []);
    _projectId = localStorage.getItem('dev_project') || (_projects[0] && _projects[0].id) || null;

    const psel = document.getElementById('projectSel');
    psel.innerHTML = _projects.map(p => `<option value="${p.id}"${p.id === _projectId ? ' selected':''}>${escapeHtml(p.name)}</option>`).join('');

    const asel = document.getElementById('assigneeSel');
    asel.innerHTML = '<option value="">All assignees</option><option value="__none__">— Unassigned —</option>' +
      _devs.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');

    const masel = document.getElementById('m_assignee');
    masel.innerHTML = '<option value="">— Unassigned —</option>' +
      _devs.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('board').classList.remove('hidden');
    render();
  }

  function onProjectChange() {
    _projectId = document.getElementById('projectSel').value;
    localStorage.setItem('dev_project', _projectId);
    render();
  }

  function devName(id) {
    const d = _devs.find(x => x.id === id);
    return d ? d.name : '';
  }

  function getFiltered() {
    const a = document.getElementById('assigneeSel').value;
    const t = document.getElementById('typeSel').value;
    return _items.filter(it => {
      if (it.project_id !== _projectId) return false;
      if (a === '__none__' && it.assignee_id) return false;
      if (a && a !== '__none__' && it.assignee_id !== a) return false;
      if (t && it.type !== t) return false;
      return true;
    });
  }

  function cardHTML(it) {
    const cls = TYPE_CLASS[it.type] || 'task';
    const an = devName(it.assignee_id);
    const tags = (it.tags || []).slice(0, 3).map(t => `<span class="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded">${escapeHtml(t)}</span>`).join(' ');
    return `<div class="wi-card ${cls}" draggable="true" data-id="${it.id}" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" onclick="if(event.shiftKey){openItem('${it.id}')}else{location.href='dev-item.html?id=${encodeURIComponent(it.id)}'}" title="Click → full detail · Shift+click → quick edit">
      <div class="flex items-center justify-between mb-1.5">
        <span class="type-icon type-${cls}">${escapeHtml(it.type)}</span>
        <div class="flex items-center gap-1.5">
          <span class="pri-dot pri-${it.priority}" title="${it.priority}"></span>
          ${it.points != null ? `<span class="pts">${it.points}</span>` : ''}
        </div>
      </div>
      <div class="text-sm font-semibold text-slate-800 leading-snug mb-2" style="word-break:break-word;">${escapeHtml(it.title)}</div>
      <div class="flex items-center justify-between gap-2">
        <div class="flex gap-1 flex-wrap min-w-0">${tags}</div>
        ${an ? `<div class="av-chip" style="background:${avatarColor(an)}18;color:${avatarColor(an)};" title="${escapeHtml(an)}">${initials(an)}</div>` : '<div class="text-xs text-slate-400">—</div>'}
      </div>
      ${it.due_date ? `<div class="mt-1.5 text-[10px] text-slate-500 flex items-center gap-1">📅 ${it.due_date}</div>` : ''}
    </div>`;
  }

  function render() {
    const list = getFiltered();
    document.getElementById('board').innerHTML = STATES.map(s => {
      const items = list.filter(it => it.state === s);
      const sc = STATE_COLORS[s];
      return `<div>
        <div class="col-head" style="background:${sc.bg};color:${sc.text};">
          <span>${s}</span>
          <span style="background:${sc.text};color:${sc.bg};padding:1px 7px;border-radius:999px;font-size:10px;">${items.length}</span>
        </div>
        <div class="col-body" data-state="${s}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          ${items.map(cardHTML).join('')}
          <button class="add-btn" onclick="openItem(null, '${s}')">+ Add to ${s}</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Drag & drop ────────────────────────────────────────────────────────────
  let _draggingId = null;
  function onDragStart(e) {
    _draggingId = e.currentTarget.dataset.id;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    _draggingId = null;
  }
  function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
  function onDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
  async function onDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    if (!_draggingId) return;
    const newState = e.currentTarget.dataset.state;
    const item = _items.find(i => i.id === _draggingId);
    if (!item || item.state === newState) return;
    const oldState = item.state;
    item.state = newState;
    render();
    const { error } = await window.sb.from('dev_work_items').update({ state: newState }).eq('id', item.id);
    if (error) {
      window.bniToast?.('Move failed: ' + error.message, 'error');
      item.state = oldState; render();
    } else {
      logHistory(item.id, 'state', oldState, newState);
    }
  }

  async function logHistory(itemId, field, oldV, newV) {
    try { await window.sb.from('dev_history').insert({ item_id: itemId, field, old_value: String(oldV ?? ''), new_value: String(newV ?? '') }); } catch {}
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openItem(id, defaultState) {
    document.getElementById('itemForm').reset();
    document.getElementById('m_id').value = '';
    if (id) {
      const it = _items.find(i => i.id === id);
      if (!it) return;
      document.getElementById('m_id').value         = id;
      document.getElementById('m_id_label').textContent = id;
      document.getElementById('m_heading').textContent  = `Edit ${it.type}`;
      document.getElementById('m_title').value      = it.title;
      document.getElementById('m_type').value       = it.type;
      document.getElementById('m_state').value      = it.state;
      document.getElementById('m_priority').value   = it.priority;
      document.getElementById('m_points').value     = it.points ?? '';
      document.getElementById('m_assignee').value   = it.assignee_id ?? '';
      document.getElementById('m_due').value        = it.due_date || '';
      document.getElementById('m_description').value = it.description || '';
      document.getElementById('m_tags').value       = (it.tags || []).join(', ');
      document.getElementById('m_delete_btn').classList.remove('hidden');
    } else {
      document.getElementById('m_id_label').textContent = 'New';
      document.getElementById('m_heading').textContent = 'New work item';
      document.getElementById('m_state').value = defaultState || 'To Do';
      document.getElementById('m_delete_btn').classList.add('hidden');
    }
    document.getElementById('itemModal').classList.remove('hidden');
    document.getElementById('m_title').focus();
  }
  function closeItem() { document.getElementById('itemModal').classList.add('hidden'); }

  function nextWorkId() {
    const proj = _projects.find(p => p.id === _projectId);
    const prefix = (proj?.id || 'p').replace(/^p_/, '').toUpperCase().slice(0, 4);
    const used = _items.filter(i => i.id.startsWith(prefix + '-')).map(i => parseInt(i.id.split('-')[1], 10)).filter(n => !isNaN(n));
    return `${prefix}-${(used.length ? Math.max(...used) : 0) + 1}`;
  }

  async function saveItem(ev) {
    ev.preventDefault();
    const id = document.getElementById('m_id').value || nextWorkId();
    const isNew = !document.getElementById('m_id').value;
    const tags = document.getElementById('m_tags').value.split(',').map(s => s.trim()).filter(Boolean);
    const payload = {
      id,
      project_id:  _projectId,
      title:       document.getElementById('m_title').value.trim(),
      type:        document.getElementById('m_type').value,
      state:       document.getElementById('m_state').value,
      priority:    document.getElementById('m_priority').value,
      points:      document.getElementById('m_points').value ? Number(document.getElementById('m_points').value) : null,
      assignee_id: document.getElementById('m_assignee').value || null,
      due_date:    document.getElementById('m_due').value || null,
      description: document.getElementById('m_description').value.trim(),
      tags,
    };
    const { error } = await window.sb.from('dev_work_items').upsert(payload);
    if (error) { window.bniToast?.('Save failed: ' + error.message, 'error'); return; }
    if (isNew) logHistory(id, 'created', '', payload.title);
    closeItem();
    await loadAll();
  }

  async function deleteItem() {
    const id = document.getElementById('m_id').value;
    if (!id) return;
    if (!confirm('Delete this work item permanently? This cannot be undone.')) return;
    const { error } = await window.sb.from('dev_work_items').delete().eq('id', id);
    if (error) { window.bniToast?.('Delete failed: ' + error.message, 'error'); return; }
    closeItem();
    await loadAll();
  }

  async function init() {
    await window.loadDevelopers?.();
    await loadAll();
  }
  init();
  </script>
</body>
</html>
